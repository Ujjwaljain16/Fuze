[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:gunicorn]
command=gunicorn app:app --bind 0.0.0.0:%(ENV_PORT)s --workers 1 --worker-class gevent --worker-connections 1000 --timeout 2000 --keep-alive 5 --access-logfile - --error-logfile -
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:rq_worker]
command=python backend/worker.py --queue default
autostart=true
autorestart=true
autorestart_delay=5
startretries=10
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
